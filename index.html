<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Story of Abhijith & Amritha</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:'Cormorant Garamond',serif;
}

/* GLOBAL PAGE STYLE */
.page{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
background:url('background.PNG') center/cover no-repeat;
transition:1.5s ease;
}

.page::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.65);
backdrop-filter:blur(3px);
}

.page > *{
position:relative;
z-index:2;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

/* PAGE 1 */
.title{
color:#f3e5ab;
font-size:2.2rem;
letter-spacing:4px;
opacity:0;
animation:fadeIn 2.5s ease forwards;
}

.subtitle{
margin-top:20px;
color:#f3e5ab;
font-size:1rem;
opacity:0.7;
letter-spacing:2px;
}

.start-btn{
margin-top:30px;
padding:14px 32px;
border:1px solid #f3e5ab;
background:transparent;
color:#f3e5ab;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.05);
}

/* PAGE 2 */
.story-text{
color:#f3e5ab;
font-size:2rem;
letter-spacing:3px;
opacity:0;
filter:blur(20px);
animation:reveal 3s ease forwards;
max-width:700px;
line-height:1.6;
}

/* PAGE 3 */
.final{
max-width:750px;
color:#f3e5ab;
padding:20px;
}

.names{
font-size:3.5rem;
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:25px;
}

.details{
font-size:1.6rem;
line-height:1.9;
margin-bottom:20px;
}

.location-btn{
display:inline-block;
margin-top:20px;
padding:12px 28px;
border:1px solid #f3e5ab;
border-radius:40px;
color:#f3e5ab;
text-decoration:none;
transition:0.3s;
}

.location-btn:hover{
transform:scale(1.05);
}

/* ANIMATIONS */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes reveal{
0%{opacity:0;filter:blur(20px);transform:scale(1.1);}
40%{opacity:0.4;filter:blur(10px);}
70%{opacity:0.8;filter:blur(4px);}
100%{opacity:1;filter:blur(0);transform:scale(1);}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<section id="p1" class="page">

<div class="title">Their Story Begins</div>
<div class="subtitle">Abhijith • Amritha</div>

<button class="start-btn" onclick="start()">Enter Story</button>

</section>

<!-- PAGE 2 -->
<section id="p2" class="page hidden">

<div class="story-text">
Two hearts, one journey, and a story written in destiny.
</div>

</section>

<!-- PAGE 3 -->
<section id="p3" class="page hidden">

<div class="final">

<div class="names">ABHIJITH & AMRITHA</div>

<div class="details">
A beautiful journey of love and togetherness<br><br>
12 September 2026<br>
11:00 AM – 11:30 AM<br><br>
Paradise Convention Hall
</div>

<a class="location-btn"
href="https://maps.app.goo.gl/8pVgrK9qQFFdyAyM7?g_st=ic"
target="_blank">
View Location
</a>

</div>

</section>

<script>

function start(){

const music = document.getElementById("music");
music.currentTime = 6;
music.play().catch(()=>{});

document.getElementById("p1").classList.add("hidden");

document.getElementById("p2").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("p2").classList.add("hidden");
document.getElementById("p3").classList.remove("hidden");
},3500);

}

</script>

</body>
</html>
