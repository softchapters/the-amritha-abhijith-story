<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abhijith & Amritha</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:'Cormorant Garamond',serif;
}

.page{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
background:url('background.PNG') center/cover no-repeat;
transition:1.3s ease;
}

.page::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.60);
}

.page > *{
position:relative;
z-index:2;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

/* PAGE 1 */
.tagline{
color:#d4af37;
font-size:1rem;
letter-spacing:4px;
opacity:0.8;
text-transform:uppercase;
margin-bottom:25px;
animation:fadeUp 2s ease;
}

.enter-btn{
padding:14px 34px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
font-size:1rem;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

.enter-btn:hover{
transform:scale(1.05);
}

/* PAGE 2 */
.magic-text{
color:#d4af37;
font-size:2.2rem;
letter-spacing:3px;
opacity:0;
filter:blur(20px);
animation:magicReveal 2.8s ease forwards;
}

/* PAGE 3 */
.invite{
max-width:700px;
color:#d4af37;
padding:20px;
}

.couple{
display:flex;
flex-direction:column;
align-items:flex-start;
margin-bottom:30px;
}

.name{
font-family:'Pinyon Script',cursive;
font-size:4rem;
line-height:1;
text-transform:capitalize;
color:#d4af37;
}

.bottom{
margin-left:2.2ch;
margin-top:-8px;
}

.details{
font-size:1.7rem;
line-height:1.9;
margin-bottom:25px;
}

.venue{
font-size:1.5rem;
margin-bottom:25px;
}

.location-btn{
display:inline-block;
padding:12px 28px;
border:1px solid #d4af37;
border-radius:40px;
color:#d4af37;
text-decoration:none;
margin-bottom:30px;
transition:0.3s;
}

.location-btn:hover{
transform:scale(1.05);
}

.footer{
font-size:1.2rem;
margin-bottom:30px;
}

.countdown{
font-size:1.3rem;
}

#timer{
margin-top:10px;
font-size:1.6rem;
letter-spacing:2px;
}

/* ANIMATIONS */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:0.8;transform:translateY(0);}
}

@keyframes magicReveal{
0%{opacity:0;filter:blur(25px);transform:scale(1.1);}
40%{opacity:0.4;filter:blur(10px);}
70%{opacity:0.8;filter:blur(4px);}
100%{opacity:1;filter:blur(0);transform:scale(1);}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<section id="page1" class="page">
<div class="tagline">A beautiful moment awaits</div>
<button class="enter-btn" onclick="start()">Step Into Our Story</button>
</section>

<!-- PAGE 2 -->
<section id="page2" class="page hidden">
<div class="magic-text">Join us as we celebrate</div>
</section>

<!-- PAGE 3 -->
<section id="page3" class="page hidden">

<div class="invite">

<div class="couple">
<div class="name">Abhijith</div>
<div class="name bottom">Amritha</div>
</div>

<div class="details">
12 September 2026<br>
11:00 AM – 11:30 AM
</div>

<div class="venue">
Paradise Convention Hall
</div>

<a class="location-btn"
href="https://maps.app.goo.gl/8pVgrK9qQFFdyAyM7?g_st=ic"
target="_blank">
View Location
</a>

<div class="footer">
Your presence will make our celebration special.
</div>

<div class="countdown">
Counting Down To Our Day
<div id="timer"></div>
</div>

</div>

</section>

<script>

function start(){

const music = document.getElementById("music");
music.currentTime = 6;
music.play().catch(()=>{});

document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("page2").classList.add("hidden");
document.getElementById("page3").classList.remove("hidden");
},3500);

}

const target = new Date("September 12, 2026 11:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();
const diff = target - now;

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("timer").innerHTML =
`${d}D : ${h}H : ${m}M : ${s}S`;

},1000);

</script>

</body>
</html>
