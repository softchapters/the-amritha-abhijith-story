<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abhijith & Amritha</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Alex+Brush&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:'Cormorant Garamond',serif;
}

.page{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
background:url('background.PNG') center center/cover no-repeat;
transition:1.4s ease;
animation:slowZoom 25s ease-in-out infinite alternate;
}

.page::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.35);
}

.page>*{
position:relative;
z-index:2;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.08);
filter:blur(10px);
}

/* PAGE 1 */

.tagline{
color:#f5e7c1;
font-size:1rem;
letter-spacing:4px;
text-transform:uppercase;
margin-bottom:25px;
opacity:.9;
animation:fadeUp 2s ease;
}

.enter-btn{
display:inline-block;
padding:12px 34px;
min-width:220px;
border:1px solid #f5e7c1;
border-radius:40px;
background:transparent;
color:#f5e7c1;
font-size:1rem;
letter-spacing:2px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.enter-btn:hover{
transform:scale(1.05);
}

/* PAGE 2 */

.magic-text{
color:#f5e7c1;
font-size:1.5rem;
letter-spacing:3px;
text-transform:uppercase;
opacity:0;
filter:blur(20px);
animation:magicReveal 3s ease forwards;
}

/* PAGE 3 */

.invite{
max-width:700px;
color:#f8edd1;
padding:20px;
}

.couple{
display:flex;
flex-direction:column;
align-items:flex-start;
margin-bottom:30px;
}

.name{
font-family:'Alex Brush',cursive;
font-size:3.9rem;
line-height:1;
color:#fff4d6;
}

.bottom{
margin-left:2.2ch;
margin-top:-8px;
}

.details{
font-size:1.7rem;
line-height:1.9;
margin-bottom:25px;
}

.venue{
font-size:1.5rem;
margin-bottom:25px;
}

.location-btn{
display:inline-block;
padding:12px 28px;
border:1px solid #f8edd1;
border-radius:40px;
color:#f8edd1;
text-decoration:none;
margin-bottom:30px;
transition:.3s;
}

.location-btn:hover{
transform:scale(1.05);
}

.footer{
font-size:1.2rem;
margin-bottom:30px;
}

.countdown{
font-size:1.3rem;
}

#timer{
margin-top:10px;
font-size:1.6rem;
letter-spacing:2px;
}

.name,
.magic-text,
.details,
.venue{
text-shadow:0 0 10px rgba(255,244,214,.15);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:.9;
transform:translateY(0);
}
}

@keyframes magicReveal{
0%{
opacity:0;
filter:blur(25px);
transform:scale(1.1);
}
40%{
opacity:.4;
filter:blur(10px);
}
70%{
opacity:.8;
filter:blur(4px);
}
100%{
opacity:1;
filter:blur(0);
transform:scale(1);
}
}

@keyframes slowZoom{
from{
background-size:100%;
}
to{
background-size:110%;
}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<section id="page1" class="page">

<div class="tagline">
A Beautiful Moment Awaits
</div>

<button class="enter-btn" onclick="start()">
OPEN INVITATION
</button>

</section>

<section id="page2" class="page hidden">

<div class="magic-text">
Join Us As We Celebrate<br>
THE ENGAGEMENT OF
</div>

</section>

<section id="page3" class="page hidden">

<div class="invite">

<div class="couple">
<div class="name">Abhijith</div>
<div class="name bottom">Amritha</div>
</div>
<div class="details">
12 September 2026<br>
11:00 AM – 11:30 AM
</div>

<div class="venue">
Paradise Convention Hall
</div>

<a
class="location-btn"
href="https://maps.app.goo.gl/8pVgrK9qQFFdyAyM7?g_st=ic"
target="_blank">
View Location
</a>

<div class="footer">
Your presence will make our celebration truly special.
</div>

<div class="countdown">
Counting Down To Our Day
<div id="timer"></div>
</div>

</div>

</section>

<script>

function start(){

const music = document.getElementById("music");

music.currentTime = 6;

music.play().catch(()=>{});

document.getElementById("page1").classList.add("hidden");

document.getElementById("page2").classList.remove("hidden");

setTimeout(()=>{

document.getElementById("page2").classList.add("hidden");

document.getElementById("page3").classList.remove("hidden");

},5000);

}

const target = new Date("September 12, 2026 11:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();

const diff = target - now;

const d = Math.floor(diff/(1000*60*60*24));

const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const m = Math.floor((diff%(1000*60*60))/(1000*60));

const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("timer").innerHTML =
`${d}D : ${h}H : ${m}M : ${s}S`;

},1000);

document.addEventListener("visibilitychange", () => {

const music = document.getElementById("music");

if(document.hidden){

music.pause();

}else{

music.play().catch(()=>{});

}

});

</script>

</body>
</html>
